networks:
  web-network:
    external: true

services:
  # PostgreSQL Database
  risk-db:
    build:
      context: ./projects/risk-predictor
      dockerfile: infrastructure/docker/database.Dockerfile
    container_name: risk-predictor-db
    env_file:
      - ./projects/risk-predictor/.env.docker 
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./data/risk-predictor/postgres:/var/lib/postgresql/data
    networks:
      - web-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ML Service
  risk-ml:
    build:
      context: ./projects/risk-predictor
      dockerfile: infrastructure/docker/ml_service.Dockerfile
    container_name: risk-predictor-ml
    env_file:
      - ./projects/risk-predictor/.env.docker
    networks:
      - web-network
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  risk-backend:
    build:
      context: ./projects/risk-predictor
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: risk-predictor-backend
    env_file:
      - ./projects/risk-predictor/.env.docker
    volumes:
      - ./projects/risk-predictor/alembic:/app/alembic
      - ./projects/risk-predictor/alembic.ini:/app/alembic.ini
    networks:
      - web-network
    restart: always
    depends_on:
      risk-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "
      echo 'Waiting for database...' &&
      sleep 5 &&
      echo 'Running Alembic migrations...' &&
      alembic upgrade head &&
      echo 'Starting FastAPI...' &&
      python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers 4
      "

  # Frontend
  risk-frontend:
    build:
      context: ./projects/risk-predictor
      dockerfile: infrastructure/docker/frontend.Dockerfile
    container_name: risk-predictor-frontend
    environment:
      VIRTUAL_HOST: cabg.insukuro.ru
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: cabg.insukuro.ru
      LETSENCRYPT_EMAIL: tukhtarovilkhom@gmail.com
    networks:
      - web-network
    restart: always
    depends_on:
      risk-backend:
        condition: service_healthy