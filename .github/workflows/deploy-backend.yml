name: Deploy Backend API

on:
  push:
    paths:
      - 'backend/**'
      - 'alembic/**'
      - 'requirements/backend.txt'
      - 'infrastructure/docker/backend.Dockerfile'
    branches:
      - main

jobs:
  
  deploy:
    #needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "backend/,alembic/,alembic.ini,requirements/backend.txt,infrastructure/docker/backend.Dockerfile"
          target: ${{ secrets.VPS_PROJECT_PATH }}
          strip_components: 0
      
      - name: Run migrations and reload
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            docker compose build risk-backend
            docker compose up -d --no-deps risk-backend
            sleep 3
            docker compose exec -T risk-backend alembic upgrade head
            docker compose restart risk-backend
            echo "✅ Backend deployed"