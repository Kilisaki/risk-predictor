# Docker DNS resolver (обязательно для Docker)
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name cabg.insukuro.ru;

    root /usr/share/nginx/html;
    index index.html;

    # Кэширование статических файлов
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Проксирование API запросов (исправлено)
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://risk-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Проксирование health, docs и openapi
    location ~ ^/(health|docs|openapi.json) {
        proxy_pass http://risk-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA - все остальные запросы на index.html
    location / {
        try_files $uri /index.html;
    }

    # Health check для Nginx
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}